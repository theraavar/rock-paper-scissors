<!DOCTYPE html>
<!-- "en" = English -->
<html lang="en">
  <head>
    <!-- Some basic meta options. -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Thera Avar">
    <!-- References to our CSS and JavaScript files. -->
    <link rel="stylesheet" href="./index.css">
    <script src="./index.js" defer></script>
    <!-- The title displayed in the tab at top of web page. -->
    <title>Rock Paper Scissors</title>
  </head>
  <!-- This is the box that contains everything else. -->
  <body class="flex-container" id="container">
    <div class="flex-container flex-box">
      <!-- This is our header. -->
      <div class="flex-container flex-box" id="header">
      </div>
      <!-- This is our navigation bar. -->
      <nav class="flex-container flex-box">
      </nav>
      <!-- This is our content. -->
      <main class="flex-container flex-box">
        <div class="flex-container flex-box playerChoices">
          <input type="image" src="rock.png" class="flex-box rock" name="rock">
          <input type="image" src="paper.png" class="flex-box paper" name="paper">
          <input type="image" src="scissors.png" class="flex-box scissors" name="scissors">
        </div>
      </main>
      <!-- This is our footer. -->
      <div class="flex-container flex-box" id="footer">
      </div>
    </div>
  </body>
</html>
